name: 'Build & Tag'

on:
  push:
    branches: [main]

jobs:
  check:
    uses: zenhelix/ci-workflows/.github/workflows/kotlin-library-check.yml@v2
    with:
      java-version: '21'

  create-tag:
    needs: check
    uses: zenhelix/ci-workflows/.github/workflows/gradle-create-tag.yml@v2
    with:
      java-version: '21'
    secrets:
      app-id: ${{ secrets.ZENHELIX_COMMITER_APP_ID }}
      app-private-key: ${{ secrets.ZENHELIX_COMMITER_APP_PRIVATE_KEY }}
